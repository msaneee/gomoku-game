<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GoMoKu - Connect 5 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            background-color: rgba(139, 105, 20, 0.95);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 95vw;
            width: fit-content;
            margin: 0 auto;
        }
        
        h1 {
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            font-size: clamp(1.5rem, 5vw, 2rem);
        }
        
        .game-info {
            background: #d2a679;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
        }
        
        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .player-card {
            background: #f5e6c8;
            border-radius: 10px;
            padding: 8px 15px;
            text-align: center;
            min-width: 120px;
            transition: all 0.3s ease;
        }
        
        .player-card.active {
            box-shadow: 0 0 0 3px #FFD700;
            transform: scale(1.02);
        }
        
        .player-name {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: bold;
            margin-bottom: 3px;
            color: #333;
        }
        
        .player-stone {
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            font-weight: bold;
        }
        
        .vs {
            font-size: 1.2em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 0 #000;
        }
        
        .status-area {
            margin-top: 5px;
        }
        
        .status-label {
            font-size: clamp(0.8rem, 3vw, 1em);
            color: #333;
            margin-bottom: 5px;
        }
        
        .turn-indicator {
            font-size: clamp(0.8rem, 3.5vw, 1.1em);
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 8px;
            background: #f0e6d2;
            display: inline-block;
        }
        
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }
        
        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            background: #deb887;
            width: 100%;
            height: auto;
            max-width: 550px;
        }
        
        .control-panel {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        input {
            padding: 10px 15px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
            width: 180px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #connectBtn {
            background: #4caf50;
            color: white;
        }
        
        #connectBtn:hover:not(:disabled) {
            background: #45a049;
        }
        
        #quitBtn {
            background: #f44336;
            color: white;
        }
        
        .message-area {
            margin-top: 15px;
            padding: 8px;
            background: #f0e6d2;
            border-radius: 8px;
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            color: #555;
            min-height: 50px;
            max-height: 80px;
            overflow-y: auto;
            text-align: left;
        }
        
        .message-area div {
            padding: 3px 0;
            border-bottom: 1px solid #ddd;
        }
        
        .error-message {
            color: #c62828 !important;
        }
        
        .info-message {
            color: #2e7d32 !important;
        }
        
        .quit-message {
            color: #ff9800 !important;
            font-weight: bold !important;
            background-color: #fff3e0 !important;
            padding: 4px 8px !important;
            margin: 2px 0 !important;
            border-radius: 4px !important;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            .player-card {
                min-width: 100px;
                padding: 5px 10px;
            }
            .control-panel {
                gap: 8px;
            }
            input, button {
                padding: 8px 12px;
                font-size: 0.9em;
            }
            .message-area {
                max-height: 60px;
            }
        }
        
        @media (max-width: 480px) {
            .player-card {
                min-width: 80px;
            }
            .vs {
                font-size: 1em;
            }
            input {
                width: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GoMoKu (Connect 5)</h1>
        
        <div class="game-info">
            <div class="player-info">
                <div class="player-card" id="player1Card">
                    <div class="player-name" id="player1Name">You</div>
                    <div class="player-stone" id="player1Stone">⚫ BLACK</div>
                </div>
                <div class="vs">VS</div>
                <div class="player-card" id="player2Card">
                    <div class="player-name" id="player2Name">Opponent</div>
                    <div class="player-stone" id="player2Stone">⚪ WHITE</div>
                </div>
            </div>
            
            <div class="status-area">
                <div class="status-label" id="statusLabel">Enter your name and connect</div>
                <div class="turn-indicator" id="turnIndicator"></div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="boardCanvas" width="550" height="550"></canvas>
        </div>
        
        <div class="control-panel">
            <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="20" autocomplete="off">
            <button id="connectBtn">🔌 Connect to Server</button>
            <button id="quitBtn" disabled>🚪 Quit Game</button>
        </div>
        
        <div class="message-area" id="messageArea">
            <div class="info-message">✨ Enter your name and click Connect ✨</div>
        </div>
    </div>
    
    <script>
        // Game constants
        const BOARD_SIZE = 10;
        const CELL_SIZE = 50;
        const OFFSET = 25;
        
        // Game state
        let socket = null;
        let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let myColor = null;
        let myName = "";
        let opponentName = "";
        let myTurn = false;
        let gameActive = false;
        let gameStarted = false;
        let playerId = null;
        let sessionId = null;
        
        // DOM elements
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const player1NameEl = document.getElementById('player1Name');
        const player2NameEl = document.getElementById('player2Name');
        const player1Card = document.getElementById('player1Card');
        const player2Card = document.getElementById('player2Card');
        const player1Stone = document.getElementById('player1Stone');
        const player2Stone = document.getElementById('player2Stone');
        const statusLabel = document.getElementById('statusLabel');
        const turnIndicator = document.getElementById('turnIndicator');
        const playerNameInput = document.getElementById('playerNameInput');
        const connectBtn = document.getElementById('connectBtn');
        const quitBtn = document.getElementById('quitBtn');
        const messageArea = document.getElementById('messageArea');
        
        // Generate a unique session ID for this browser tab
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        // Get or create player ID (persists across refreshes)
        function getPlayerId() {
            let id = localStorage.getItem('gomoku_player_id');
            if (!id) {
                id = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('gomoku_player_id', id);
            }
            return id;
        }
        
        // Save game state for possible refresh recovery
        function saveGameState() {
            if (gameStarted && gameActive) {
                const gameState = {
                    myColor: myColor,
                    myName: myName,
                    opponentName: opponentName,
                    myTurn: myTurn,
                    gameActive: gameActive,
                    gameStarted: gameStarted,
                    board: board,
                    playerId: playerId,
                    sessionId: sessionId
                };
                localStorage.setItem('gomoku_game_state', JSON.stringify(gameState));
                console.log('Game state saved');
            }
        }
        
        // Load game state after refresh
        function loadGameState() {
            const savedState = localStorage.getItem('gomoku_game_state');
            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    if (state.sessionId && state.sessionId === sessionId) {
                        myColor = state.myColor;
                        myName = state.myName;
                        opponentName = state.opponentName || "";
                        myTurn = state.myTurn;
                        gameActive = state.gameActive;
                        gameStarted = state.gameStarted;
                        board = state.board;
                        playerId = state.playerId;
                        
                        if (myName) {
                            playerNameInput.value = myName;
                            playerNameInput.disabled = true;
                        }
                        
                        updateUI();
                        drawBoard();
                        statusLabel.textContent = "Game in progress - reconnecting...";
                        return true;
                    } else {
                        localStorage.removeItem('gomoku_game_state');
                    }
                } catch (e) {
                    console.error('Failed to load saved state:', e);
                }
            }
            return false;
        }
        
        function clearGameState() {
            localStorage.removeItem('gomoku_game_state');
        }
        
        function drawBoard() {
            ctx.fillStyle = '#deb887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            
            for (let i = 0; i <= BOARD_SIZE; i++) {
                const x = OFFSET + i * CELL_SIZE;
                ctx.moveTo(x, OFFSET);
                ctx.lineTo(x, OFFSET + BOARD_SIZE * CELL_SIZE);
                ctx.stroke();
                
                const y = OFFSET + i * CELL_SIZE;
                ctx.moveTo(OFFSET, y);
                ctx.lineTo(OFFSET + BOARD_SIZE * CELL_SIZE, y);
                ctx.stroke();
            }
            
            const stoneSize = CELL_SIZE * 0.7;
            const stoneOffset = stoneSize / 2;
            const cellCenter = CELL_SIZE / 2;
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] !== 0) {
                        const x = OFFSET + col * CELL_SIZE + cellCenter - stoneOffset;
                        const y = OFFSET + row * CELL_SIZE + cellCenter - stoneOffset;
                        
                        ctx.beginPath();
                        ctx.arc(x + stoneOffset, y + stoneOffset, stoneOffset, 0, 2 * Math.PI);
                        
                        if (board[row][col] === 1) {
                            ctx.fillStyle = '#000';
                            ctx.fill();
                            ctx.beginPath();
                            ctx.arc(x + stoneOffset - 3, y + stoneOffset - 3, stoneOffset * 0.2, 0, 2 * Math.PI);
                            ctx.fillStyle = '#666';
                            ctx.fill();
                        } else {
                            ctx.fillStyle = '#fff';
                            ctx.fill();
                            ctx.strokeStyle = '#000';
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.arc(x + stoneOffset - 3, y + stoneOffset - 3, stoneOffset * 0.15, 0, 2 * Math.PI);
                            ctx.fillStyle = '#ddd';
                            ctx.fill();
                        }
                    }
                }
            }
        }
        
        function addMessage(msg, isError = false, isQuit = false) {
            const msgDiv = document.createElement('div');
            msgDiv.textContent = msg;
            if (isQuit) {
                msgDiv.className = 'quit-message';
            } else {
                msgDiv.className = isError ? 'error-message' : 'info-message';
            }
            messageArea.appendChild(msgDiv);
            
            while (messageArea.children.length > 15) {
                messageArea.removeChild(messageArea.firstChild);
            }
            
            messageArea.scrollTop = messageArea.scrollHeight;
        }
        
        function updateUI() {
            if (!gameStarted) return;
            
            if (myColor === 'BLACK') {
                player1NameEl.textContent = myName;
                player2NameEl.textContent = opponentName || 'Waiting...';
                player1Stone.innerHTML = '⚫ BLACK';
                player2Stone.innerHTML = '⚪ WHITE';
            } else if (myColor === 'WHITE') {
                player1NameEl.textContent = opponentName || 'Waiting...';
                player2NameEl.textContent = myName;
                player1Stone.innerHTML = '⚪ WHITE';
                player2Stone.innerHTML = '⚫ BLACK';
            }
            
            if (myTurn && gameActive) {
                turnIndicator.innerHTML = '🎯 YOUR TURN - Click on the board 🎯';
                turnIndicator.style.color = '#2e7d32';
                turnIndicator.style.background = '#c8e6c9';
                if (myColor === 'BLACK') {
                    player1Card.classList.add('active');
                    player2Card.classList.remove('active');
                } else {
                    player1Card.classList.remove('active');
                    player2Card.classList.add('active');
                }
            } else if (gameActive) {
                turnIndicator.innerHTML = '⏳ WAITING FOR OPPONENT ⏳';
                turnIndicator.style.color = '#c62828';
                turnIndicator.style.background = '#ffcdd2';
                if (myColor === 'BLACK') {
                    player1Card.classList.remove('active');
                    player2Card.classList.add('active');
                } else {
                    player1Card.classList.add('active');
                    player2Card.classList.remove('active');
                }
            }
            
            if (gameStarted) {
                saveGameState();
            }
        }
        
        function resetGameState() {
            gameActive = false;
            gameStarted = false;
            myColor = null;
            myTurn = false;
            opponentName = "";
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            drawBoard();
            turnIndicator.innerHTML = '';
            player1Card.classList.remove('active');
            player2Card.classList.remove('active');
            clearGameState();
        }
        
        function connectToServer(isReconnect = false) {
            const name = playerNameInput.value.trim();
            if (!name && !isReconnect) {
                addMessage('Please enter your name', true);
                return;
            }
            
            if (!isReconnect) {
                myName = name;
                playerId = getPlayerId();
                sessionId = generateSessionId();
                playerNameInput.disabled = true;
            }
            
            // IMPORTANT: Update this URL to your Render.com server URL
            // Replace "gomoku-game.onrender.com" with your actual Render URL
            const wsUrl = `wss://gomoku-game.onrender.com`;
            
            addMessage(`Connecting to ${wsUrl}...`);
            connectBtn.disabled = true;
            connectBtn.textContent = 'Connecting...';
            
            try {
                socket = new WebSocket(wsUrl);
                
                socket.onopen = () => {
                    addMessage(`Connected!`);
                    if (isReconnect && playerId && sessionId) {
                        socket.send(`RECONNECT|${playerId}|${sessionId}|${myName}`);
                    } else {
                        socket.send(myName);
                    }
                    statusLabel.textContent = 'Connected...';
                    quitBtn.disabled = false;
                    connectBtn.textContent = 'Connected';
                };
                
                socket.onmessage = (event) => {
                    const msg = event.data;
                    console.log('📨 Received:', msg);
                    const parts = msg.split('|');
                    const command = parts[0];
                    
                    switch(command) {
                        case 'CONNECTED':
                            addMessage(`✅ ${parts[1] || 'Connected'}`);
                            if (parts[1] && parts[1].includes('restored')) {
                                statusLabel.textContent = 'Game restored!';
                            } else if (!gameStarted) {
                                statusLabel.textContent = 'Connected, waiting for opponent...';
                            }
                            break;
                            
                        case 'WAITING':
                            statusLabel.textContent = parts[1];
                            addMessage('🔄 ' + parts[1]);
                            break;
                            
                        case 'START':
                            myColor = parts[1];
                            opponentName = parts[3];
                            myTurn = (myColor === 'BLACK');
                            gameActive = true;
                            gameStarted = true;
                            if (!parts[2] || parts[2] !== 'Continue game') {
                                board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
                            }
                            drawBoard();
                            updateUI();
                            statusLabel.textContent = `Game started! You are ${myColor}`;
                            addMessage(`🎮 Game started! You play ${myColor} against ${opponentName}`);
                            break;
                            
                        case 'MOVE':
                            const color = parts[1];
                            const row = parseInt(parts[2]);
                            const col = parseInt(parts[3]);
                            const stone = color === 'BLACK' ? 1 : 2;
                            board[row][col] = stone;
                            drawBoard();
                            myTurn = (myColor !== color);
                            updateUI();
                            const playerName = color === myColor ? 'You' : opponentName;
                            addMessage(`🎲 ${playerName} placed at (${row}, ${col})`);
                            break;
                            
                        case 'TURN':
                            const nextTurn = parts[1];
                            myTurn = (myColor === nextTurn);
                            updateUI();
                            break;
                            
                        case 'WIN':
                            const winner = parts[1];
                            const winMsg = parts[2];
                            gameActive = false;
                            gameStarted = false;
                            statusLabel.textContent = winMsg;
                            turnIndicator.innerHTML = winner === myColor ? '🏆 YOU WIN! 🏆' : '😢 YOU LOSE 😢';
                            turnIndicator.style.color = winner === myColor ? '#2e7d32' : '#c62828';
                            addMessage(winMsg);
                            connectBtn.disabled = false;
                            connectBtn.textContent = 'Connect to Server';
                            quitBtn.disabled = true;
                            clearGameState();
                            break;
                            
                        case 'DRAW':
                            gameActive = false;
                            gameStarted = false;
                            statusLabel.textContent = parts[1];
                            turnIndicator.innerHTML = '🤝 DRAW 🤝';
                            turnIndicator.style.color = '#ff9800';
                            addMessage(parts[1]);
                            connectBtn.disabled = false;
                            connectBtn.textContent = 'Connect to Server';
                            quitBtn.disabled = true;
                            clearGameState();
                            break;
                            
                        case 'QUIT':
                            const quitterName = parts[1];
                            const quitMessageText = parts[2];
                            
                            gameActive = false;
                            gameStarted = false;
                            statusLabel.textContent = quitMessageText;
                            
                            if (quitterName === myName) {
                                turnIndicator.innerHTML = `🚪 You left the game 🚪`;
                                addMessage(`You quit the game`, false, true);
                            } else {
                                turnIndicator.innerHTML = `🚪 ${quitterName} left the game 🚪`;
                                addMessage(quitMessageText, false, true);
                            }
                            turnIndicator.style.color = '#ff9800';
                            
                            connectBtn.disabled = false;
                            connectBtn.textContent = 'Connect to Server';
                            quitBtn.disabled = true;
                            
                            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
                            drawBoard();
                            player1Card.classList.remove('active');
                            player2Card.classList.remove('active');
                            clearGameState();
                            break;
                            
                        case 'ERROR':
                            addMessage(`❌ Error: ${parts[1]}`, true);
                            break;
                            
                        default:
                            console.log('Unknown command:', command);
                    }
                };
                
                socket.onclose = () => {
                    console.log('🔌 Socket closed');
                    if (gameActive && gameStarted) {
                        addMessage('⚠️ Connection lost! Refresh to reconnect.', true);
                        statusLabel.textContent = 'Connection lost - refresh to reconnect';
                    } else {
                        addMessage('🔌 Disconnected from server');
                        statusLabel.textContent = 'Disconnected';
                    }
                    connectBtn.disabled = false;
                    connectBtn.textContent = 'Connect to Server';
                    quitBtn.disabled = true;
                };
                
                socket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    addMessage('Connection error', true);
                    connectBtn.disabled = false;
                    connectBtn.textContent = 'Connect to Server';
                };
                
            } catch(e) {
                addMessage(`Failed: ${e.message}`, true);
                connectBtn.disabled = false;
                connectBtn.textContent = 'Connect to Server';
            }
        }
        
        function quitGame() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send('QUIT');
                addMessage('Quitting game...', false);
            }
            resetGameState();
            connectBtn.disabled = false;
            connectBtn.textContent = 'Connect to Server';
            quitBtn.disabled = true;
        }
        
        function handleCanvasClick(e) {
            if (!gameActive || !myTurn || !socket || socket.readyState !== WebSocket.OPEN) {
                if (!gameActive && gameStarted) addMessage('Game not active - reconnect?', true);
                else if (!myTurn && gameActive) addMessage('Not your turn!', true);
                else if (!socket || socket.readyState !== WebSocket.OPEN) addMessage('Not connected to server', true);
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            const col = Math.floor((mouseX - OFFSET) / CELL_SIZE);
            const row = Math.floor((mouseY - OFFSET) / CELL_SIZE);
            
            if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
                if (board[row][col] === 0) {
                    socket.send(`MOVE|${row}|${col}`);
                    addMessage(`You played at (${row}, ${col})`);
                    statusLabel.textContent = 'Move sent...';
                } else {
                    addMessage('Position already taken!', true);
                }
            } else {
                addMessage('Click inside the board grid!', true);
            }
        }
        
        window.addEventListener('beforeunload', () => {
            if (socket && socket.readyState === WebSocket.OPEN && gameActive) {
                socket.send('PAGE_CLOSE');
            }
        });
        
        window.addEventListener('load', () => {
            sessionId = generateSessionId();
            console.log('Page loaded with session ID:', sessionId);
            const restored = loadGameState();
            if (restored && (gameActive || gameStarted)) {
                addMessage("🔄 Page refreshed - reconnecting to game...", false);
                setTimeout(() => {
                    connectToServer(true);
                }, 500);
            }
        });
        
        canvas.addEventListener('click', handleCanvasClick);
        connectBtn.addEventListener('click', () => connectToServer(false));
        quitBtn.addEventListener('click', quitGame);
        
        drawBoard();
        
        playerNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                connectToServer(false);
            }
        });
        
        function resizeCanvas() {
            const wrapper = document.querySelector('.canvas-wrapper');
            if (wrapper) {
                const maxWidth = wrapper.clientWidth;
                if (maxWidth < 550) {
                    canvas.style.width = maxWidth + 'px';
                    canvas.style.height = maxWidth + 'px';
                } else {
                    canvas.style.width = '550px';
                    canvas.style.height = '550px';
                }
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);
        
        console.log("Client ready. Waiting for connection...");
    </script>
</body>
</html>
